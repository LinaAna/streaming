<div class="form-page">
  <div class="form-container">

    <div class="form-header">
      <a routerLink="/painelAdmin" class="btn-voltar">
        <i class="fas fa-arrow-left"></i>
      </a>
      <div>
        <h1>Novo Filme</h1>
        <p>Preencha os dados do filme abaixo</p>
      </div>
    </div>

    <form class="form" [formGroup]="artigoForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="titulo">Título</label>
        <input 
          id="titulo" 
          type="text" 
          placeholder="Ex: Interestelar" 
          formControlName="titulo"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="genero">Gênero</label>
          <select id="genero" formControlName="genero">
            <option value="">Selecione...</option>
            <option value="Ação">Ação</option>
            <option value="Drama">Drama</option>
            <option value="Comédia">Comédia</option>
            <option value="Terror">Terror</option>
            <option value="Ficção">Ficção Científica</option>
            <option value="Animação">Animação</option>
            <option value="Documentário">Documentário</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ano">Ano de Lançamento</label>
          <input 
            id="ano" 
            type="number" 
            placeholder="Ex: 2024" 
            min="1900" 
            max="2099" 
            formControlName="ano_lancamento"/>
        </div>

        <div class="form-group">
          <label for="nota">Nota</label>
          <input 
            id="nota" 
            type="number" 
            placeholder="0.0 - 10.0" 
            min="0" 
            max="10" 
            step="0.1" 
            formControlName="nota"/>
        </div>
      </div>

      <div class="form-group">
        <label for="imagem">URL da Imagem (Poster)</label>
        <input 
          id="imagem" 
          type="text" 
          placeholder="https://linkdaimagem.com/poster.jpg" 
          formControlName="imagem_url"
        />
      </div>

      <div class="form-group">
        <label for="descricao">Descrição</label>
        <textarea 
          id="descricao" 
          rows="4" 
          placeholder="Sinopse do filme..."
          formControlName="descricao"></textarea> </div>

      <div class="form-actions">
        <a routerLink="/painelAdmin" class="btn-cancelar">Cancelar</a>
        <button type="submit" class="btn-salvar">
          <i class="fas fa-save"></i> Salvar Filme
        </button>
      </div>

    </form>
  </div>
</div>
