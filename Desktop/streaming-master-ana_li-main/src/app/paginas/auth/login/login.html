<!-- Fundo animado decorativo -->
<div class="movie-background"></div>
<div class="movie-overlay"></div>

<div class="bg-grid" aria-hidden="true"></div>

<main class="page-wrapper">

  <!-- Logo -->
  <header class="site-header">
    <a href="#" class="logo" aria-label="StreamVerse – página inicial">
      <span class="logo-next">Faça seu </span><span class="logo-movie">login.</span>
    </a>
  </header>

  <!-- Card de Login -->
  <section class="card" aria-labelledby="form-title">

    <div class="card-header">
      <h1 id="form-title" class="card-title">Entrar</h1>
      <p class="card-subtitle">Acesse sua conta e continue assistindo.</p>
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- Campo: E-mail -->
      <div class="field-group" id="group-email">
        <label for="email" class="field-label">E-mail</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope input-icon" aria-hidden="true"></i>
          <input
            type="email"
            id="email"
            name="email"
            class="input-field"
            placeholder="seu@email.com"
            autocomplete="email"
            aria-describedby="error-email"
            aria-required="true"
            formControlName="email"
          />
        </div>
        <span class="error-msg" id="error-email" role="alert" aria-live="polite"></span>
      </div>

      <!-- Campo: Senha -->
      <div class="field-group" id="group-password">
        <label for="password" class="field-label">Senha</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon" aria-hidden="true"></i>
          <input
            type="password"
            id="password"
            name="password"
            class="input-field"
            placeholder="Digite sua senha"
            autocomplete="current-password"
            aria-describedby="error-password"
            aria-required="true"
            formControlName="password"

          />
          <button
            type="button"
            class="toggle-password"
            aria-label="Mostrar senha"
            data-target="password"
          >
            <i class="fa-solid fa-eye" aria-hidden="true"></i>
          </button>
        </div>
        <span class="error-msg" id="error-password" role="alert" aria-live="polite"></span>
      </div>

      <!-- Opções (lembrar-me)-->
      <div class="login-options">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox-input">
          <span class="checkbox-custom"></span>
          <span class="checkbox-text">Lembrar-me</span>
        </label>

        <a href="#" class="forgot-password">
          Esqueceu a senha?
        </a>
      </div>

 <!-- Botão -->
<button
  type="submit"
  class="btn-submit"
  id="btn-submit"
  [disabled]="estaCarregando()">

  @if (estaCarregando()) {
    <span class="btn-text">Entrando...</span>
    <span class="btn-spinner" aria-hidden="true"></span>
  } @else {
    <span class="btn-text">
      Entrar na conta <i class="fas fa-sign-in-alt"></i>
    </span>
  }

</button>
    </form>

    <!-- Link para cadastro -->
    <p class="login-link">
      Não possui uma conta?
      <a href="#" class="link-login">Criar conta</a>
    </p>

  </section>

</main>

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="assertive" aria-atomic="true">
  <i class="fa-solid fa-circle-check toast-icon" aria-hidden="true"></i>
  <span>Login realizado com sucesso!</span>
</div>
